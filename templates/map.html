<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bike Lane Hazard Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #filter-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 10px;
      padding: 10px 14px;
      background: #fff;
      border-bottom: 1px solid #dde3ec;
      z-index: 1000;
      position: relative;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .filter-group label {
      font-size: 0.72rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .filter-group select,
    .filter-group input[type="date"] {
      padding: 6px 10px;
      border: 1.5px solid #d0d5dd;
      border-radius: 6px;
      font-size: 0.88rem;
      background: #fafafa;
      color: #1a1a2e;
      height: 34px;
    }

    .filter-group select:focus,
    .filter-group input[type="date"]:focus {
      outline: none;
      border-color: #4a7cf7;
      background: #fff;
    }

    .filter-actions {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .btn-apply {
      padding: 0 18px;
      height: 34px;
      background: #4a7cf7;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-apply:hover { background: #2f63e8; }

    .btn-reset {
      padding: 0 14px;
      height: 34px;
      background: #f4f6f8;
      color: #444;
      border: 1.5px solid #d0d5dd;
      border-radius: 6px;
      font-size: 0.88rem;
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .btn-reset:hover { background: #e8ecf0; }

    #map {
      width: 100%;
      height: calc(100vh - 57px);
    }

    .popup-img {
      width: 100%;
      max-width: 280px;
      height: auto;
      border-radius: 8px;
      margin-top: 8px;
    }

    @media (max-width: 600px) {
      #filter-bar { padding: 8px 10px; gap: 8px; }
      .filter-group select,
      .filter-group input[type="date"] { font-size: 0.82rem; }
    }
  </style>
</head>
<body>

  <form id="filter-bar" method="get" action="/map">
    <div class="filter-group">
      <label for="hazard">Hazard type</label>
      <select id="hazard" name="hazard">
        <option value="all" {% if selected_hazard == "all" %}selected{% endif %}>All hazards</option>
        <option value="vehicle"              {% if selected_hazard == "vehicle" %}selected{% endif %}>Vehicle</option>
        <option value="leaves"               {% if selected_hazard == "leaves" %}selected{% endif %}>Leaves</option>
        <option value="sediment"             {% if selected_hazard == "sediment" %}selected{% endif %}>Sediment</option>
        <option value="advance warning sign" {% if selected_hazard == "advance warning sign" %}selected{% endif %}>Advance warning sign</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="start">From date</label>
      <input type="date" id="start" name="start" value="{{ selected_start }}">
    </div>

    <div class="filter-group">
      <label for="end">To date</label>
      <input type="date" id="end" name="end" value="{{ selected_end }}">
    </div>

    <div class="filter-actions">
      <button type="submit" class="btn-apply">Apply</button>
      <a href="/map" class="btn-reset">Reset</a>
    </div>
  </form>

  <div id="map"></div>

  <script>
    const SUPABASE_URL      = {{ supabase_url|tojson }};
    const SUPABASE_ANON_KEY = {{ supabase_anon_key|tojson }};
    const FILTER_HAZARD     = {{ selected_hazard|tojson }};
    const FILTER_START      = {{ selected_start|tojson }};
    const FILTER_END        = {{ selected_end|tojson }};

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const map = L.map("map").setView([37.54, -77.43], 13);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const bounds = L.latLngBounds([]);

    function escapeHtml(str) {
      if (str == null) return "";
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadDetections() {
      let query = supabaseClient
        .from("detections")
        .select("*")
        .not("latitude", "is", null)
        .not("longitude", "is", null);

      if (FILTER_HAZARD && FILTER_HAZARD !== "all") {
        query = query.eq("class_name", FILTER_HAZARD);
      }

      if (FILTER_START) {
        query = query.gte("gpx_time", FILTER_START + "T00:00:00");
      }

      if (FILTER_END) {
        query = query.lte("gpx_time", FILTER_END + "T23:59:59");
      }

      const { data, error } = await query;

      if (error) {
        console.error("Supabase query error:", error);
        alert("Error loading detections. Check browser console.");
        return;
      }

      console.log("Detections returned:", data);

      if (!data || data.length === 0) {
        console.log("No detections found.");
        return;
      }

      data.forEach((row) => {
        const lat = Number(row.latitude);
        const lon = Number(row.longitude);

        if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;
        if (lat < -90 || lat > 90 || lon < -180 || lon > 180) return;

        const marker = L.circleMarker([lat, lon], {
          radius: 6,
          weight: 2,
          opacity: 1,
          fillOpacity: 0.8
        }).addTo(map);

        const popupHtml = `
          <div style="max-width: 300px;">
            <strong>${escapeHtml(row.class_name || "Hazard")}</strong><br>
            Job: ${escapeHtml(row.job_name || "N/A")}<br>
            Confidence: ${row.confidence != null ? Number(row.confidence).toFixed(2) : "N/A"}<br>
            Time: ${row.timestamp_seconds != null ? row.timestamp_seconds + " sec" : "N/A"}<br>
            Lat: ${lat}<br>
            Lon: ${lon}
            ${row.image_url ? `<br><img class="popup-img" src="${row.image_url}" alt="Hazard image">` : ""}
          </div>
        `;

        marker.bindPopup(popupHtml);
        bounds.extend([lat, lon]);
      });

      if (bounds.isValid()) {
        map.fitBounds(bounds, { padding: [30, 30] });
      }
    }

    loadDetections();
  </script>
</body>
</html>
