<script>
  const SUPABASE_URL = {{ supabase_url|tojson }};
  const SUPABASE_ANON_KEY = {{ supabase_anon_key|tojson }};

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const map = L.map("map").setView([37.54, -77.43], 13);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const bounds = L.latLngBounds([]);

  function escapeHtml(str) {
    if (str == null) return "";
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  async function loadDetections() {
    const { data, error } = await supabaseClient
      .from("detections")
      .select("*")
      .not("latitude", "is", null)
      .not("longitude", "is", null);

    if (error) {
      console.error("Supabase query error:", error);
      alert("Error loading detections. Check browser console.");
      return;
    }

    console.log("Detections returned:", data);

    if (!data || data.length === 0) {
      console.log("No detections found.");
      return;
    }

    data.forEach((row) => {
      const lat = Number(row.latitude);
      const lon = Number(row.longitude);

      console.log("Row coords:", row.id, lat, lon, row);

      if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
        console.warn("Skipping invalid coordinates:", row);
        return;
      }

      if (lat < -90 || lat > 90 || lon < -180 || lon > 180) {
        console.warn("Skipping out-of-range coordinates:", row);
        return;
      }

      const marker = L.circleMarker([lat, lon], {
        radius: 6,
        weight: 2,
        opacity: 1,
        fillOpacity: 0.8
      }).addTo(map);

      const popupHtml = `
        <div style="max-width: 300px;">
          <strong>${escapeHtml(row.class_name || "Hazard")}</strong><br>
          Job: ${escapeHtml(row.job_name || "N/A")}<br>
          Confidence: ${row.confidence != null ? Number(row.confidence).toFixed(2) : "N/A"}<br>
          Time: ${row.timestamp_seconds != null ? row.timestamp_seconds + " sec" : "N/A"}<br>
          Lat: ${lat}<br>
          Lon: ${lon}
          ${row.image_url ? `<br><img class="popup-img" src="${row.image_url}" alt="Hazard image">` : ""}
        </div>
      `;

      marker.bindPopup(popupHtml);
      bounds.extend([lat, lon]);
    });

    console.log("Bounds valid?", bounds.isValid(), bounds);

    if (bounds.isValid()) {
      map.fitBounds(bounds, { padding: [30, 30] });
    }
  }

  loadDetections();
</script>
